<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Streaming Financial Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { margin: 0; color: #1e293b; }
        .meta-status { text-align: right; font-size: 14px; color: #64748b; }
        .badge { background: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-weight: bold; color: #334155; }
        .tables-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .table-box { background: #fff; border: 1px solid #cbd5e1; border-radius: 6px; padding: 15px; max-height: 600px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
        th { background: #f8fafc; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        .error-alert { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <div>
            <h1>Real-Time SPY Option Chain Streamer</h1>
            <div id="error-box" class="error-alert"></div>
        </div>
        <div class="meta-status">
            <div>Data Status: <span id="sync-status" class="badge">Connecting...</span></div>
            <div style="margin-top: 5px;">UI Refreshing In: <span id="countdown" style="font-weight:bold; color:#2563eb;">--</span>s</div>
        </div>
    </div>

    <div class="tables-wrapper">
        <div class="table-box">
            <h3 style="color:#dc2626; margin-top:0;">SPY Puts Dataset</h3>
            <table id="puts-table"><thead><tr id="puts-th"></tr></thead><tbody id="puts-tbody"></tbody></table>
        </div>
        
        <div class="table-box">
            <h3 style="color:#16a34a; margin-top:0;">SPY Calls Dataset</h3>
            <table id="calls-table"><thead><tr id="calls-th"></tr></thead><tbody id="calls-tbody"></tbody></table>
        </div>
    </div>
</div>

<script>
    let secondsToRefresh = 60;

    async function fetchLatestData() {
        const syncStatus = document.getElementById('sync-status');
        const errorBox = document.getElementById('error-box');
        
        try {
            const res = await fetch('/api/live-options');
            const result = await res.json();

            if (result.error) {
                errorBox.textContent = result.error;
                errorBox.style.display = 'block';
            } else {
                errorBox.style.display = 'none';
            }

            if (!result.success) {
                syncStatus.textContent = "Waiting for data...";
                return;
            }

            // Update timestamp
            const timeString = new Date(result.lastUpdated).toLocaleTimeString();
            syncStatus.textContent = `Live (Server updated at ${timeString})`;
            syncStatus.style.backgroundColor = '#dcfce7';
            syncStatus.style.color = '#166534';

            // Render both data boards
            renderTable(result.puts, 'puts-th', 'puts-tbody');
            renderTable(result.calls, 'calls-th', 'calls-tbody');
            
            // Reset countdown clock
            secondsToRefresh = 60;

        } catch (err) {
            console.error("UI fetch error:", err);
            syncStatus.textContent = "Connection Lost";
            syncStatus.style.backgroundColor = '#fef2f2';
            syncStatus.style.color = '#991b1b';
        }
    }

    function renderTable(dataArray, headerId, bodyId) {
        const headerRow = document.getElementById(headerId);
        const tbody = document.getElementById(bodyId);
        headerRow.innerHTML = '';
        tbody.innerHTML = '';

        if (!dataArray || dataArray.length === 0) {
            tbody.innerHTML = '<tr><td>No data currently cached in server memory.</td></tr>';
            return;
        }

        const columns = Object.keys(dataArray[0]);
        columns.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col;
            headerRow.appendChild(th);
        });

        dataArray.forEach(row => {
            const tr = document.createElement('tr');
            columns.forEach(col => {
                const td = document.createElement('td');
                td.textContent = row[col];
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }

    // Ticker timer engine that counts down and triggers updates
    setInterval(() => {
        secondsToRefresh--;
        document.getElementById('countdown').textContent = secondsToRefresh;
        
        if (secondsToRefresh <= 0) {
            fetchLatestData();
        }
    }, 1000);

    // Initial pull immediately upon landing on the dashboard webpage
    fetchLatestData();
</script>
</body>
</html>
